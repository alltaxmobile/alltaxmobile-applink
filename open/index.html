<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올택스 앱으로 이동 중</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f7ff;
        --panel: rgba(255, 255, 255, 0.96);
        --text: #1b2340;
        --muted: #5f6885;
        --line: #dfe7ff;
        --brand-blue: #002af2;
        --brand-green: #00d255;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 112px 24px 24px;
        color: var(--text);
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0, 210, 85, 0.1), transparent 20%),
          radial-gradient(circle at top right, rgba(0, 42, 242, 0.12), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f3f7ff 100%);
      }

      .app-banner {
        position: fixed;
        z-index: 10;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: min(640px, calc(100% - 32px));
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 32px rgba(27, 35, 64, 0.12);
        backdrop-filter: blur(16px);
      }

      .app-icon {
        display: block;
        flex: 0 0 48px;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
      }

      .app-copy {
        min-width: 0;
        flex: 1;
      }

      .app-name {
        display: block;
        font-size: 16px;
        font-weight: 800;
      }

      .app-description {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
      }

      .app-open-link {
        flex: 0 0 auto;
        min-width: auto;
        padding: 10px 16px;
        box-shadow: none;
      }

      .store-link {
        color: var(--brand-blue);
        background: #ffffff;
        box-shadow: none;
      }

      .panel {
        width: min(640px, 100%);
        padding: 34px 30px 30px;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 42, 242, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
        line-height: 1.18;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 15px 18px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--brand-blue);
        color: #ffffff;
        background: var(--brand-blue);
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(0, 42, 242, 0.18);
      }

      @media (max-width: 640px) {
        body {
          padding: 104px 16px 16px;
        }

        .app-banner {
          top: 12px;
          width: calc(100% - 24px);
          gap: 10px;
          padding: 10px;
          border-radius: 18px;
        }

        .app-icon {
          flex-basis: 44px;
          width: 44px;
          height: 44px;
          border-radius: 12px;
        }

        .app-description {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .app-open-link {
          width: auto;
          padding: 9px 13px;
        }

        .panel {
          padding: 24px 20px;
          border-radius: 24px;
        }

        h1 {
          font-size: 28px;
        }

        .store-link {
          width: 100%;
        }
      }
    </style>
    <script>
      const APP_STORE_URL =
        "https://apps.apple.com/kr/app/%EC%98%AC%ED%83%9D%EC%8A%A4-%EB%82%B4%EC%86%90%EC%95%88%EC%9D%98-%EC%84%B8%EB%AC%B4-%EB%B9%84%EC%84%9C/id6529523756";
      const PLAY_STORE_URL =
        "https://play.google.com/store/apps/details?id=kr.co.alltaxmobile.aos";

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS =
        /iPad|iPhone|iPod/.test(userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(userAgent);
      const STORE_REDIRECT_DELAY_MS = 1500;

      function fallbackStoreUrl() {
        if (isIOS) return APP_STORE_URL;
        if (isAndroid) return PLAY_STORE_URL;
        return null;
      }

      function appSchemeUrl() {
        const url = new URL(window.location.href);
        const segments = url.pathname.split("/").filter(Boolean);
        let target = segments[0];
        let id = segments[1] || url.searchParams.get("id");

        if (target === "open") {
          target = segments[1] || url.searchParams.get("screen");
          id = segments[2] || url.searchParams.get("id");
        }

        const appUrl = new URL(`alltaxmobile://${target || ""}`);
        url.searchParams.forEach((value, key) => {
          if (key !== "screen") appUrl.searchParams.set(key, value);
        });
        if (id && !appUrl.searchParams.has("id")) {
          appUrl.searchParams.set("id", id);
        }
        return appUrl.toString();
      }

      window.addEventListener("load", () => {
        const appLink = document.getElementById("app-link");
        const manualLink = document.getElementById("manual-link");
        const appUrl = appSchemeUrl();
        const storeLink = fallbackStoreUrl();
        appLink.href = appUrl;

        if (!storeLink) {
          manualLink.hidden = true;
          return;
        }

        manualLink.href = storeLink;
        let storeRedirectTimer = window.setTimeout(() => {
          if (document.hidden || !document.hasFocus()) return;
          window.location.replace(storeLink);
        }, STORE_REDIRECT_DELAY_MS);

        const cancelStoreRedirect = () => {
          if (storeRedirectTimer === null) return;
          window.clearTimeout(storeRedirectTimer);
          storeRedirectTimer = null;
        };

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) cancelStoreRedirect();
        });
        window.addEventListener("blur", cancelStoreRedirect);
        window.addEventListener("pagehide", cancelStoreRedirect);

        window.location.href = appUrl;
      });
    </script>
  </head>
  <body>
    <aside class="app-banner" aria-label="올택스 앱 열기">
      <img
        class="app-icon"
        src="/assets/alltax-app-icon.png"
        alt="올택스 앱 아이콘"
      />
      <div class="app-copy">
        <strong class="app-name">올택스</strong>
        <span class="app-description">내 손안의 세무 비서</span>
      </div>
      <a id="app-link" class="app-open-link" href="/">앱 열기</a>
    </aside>
    <main class="panel">
      <h1>올택스를 시작해 보세요</h1>
      <p>
        앱을 여는 중입니다. 앱이 설치되어 있지 않다면 잠시 후 스토어로
        이동합니다.
      </p>
      <div class="actions">
        <a id="manual-link" class="store-link" href="/">스토어로 이동하기</a>
      </div>
    </main>
  </body>
</html>
