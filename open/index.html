<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올택스 앱으로 이동 중</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f7ff;
        --panel: rgba(255, 255, 255, 0.96);
        --text: #1b2340;
        --muted: #5f6885;
        --line: #dfe7ff;
        --brand-blue: #002af2;
        --brand-green: #00d255;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--text);
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0, 210, 85, 0.1), transparent 20%),
          radial-gradient(circle at top right, rgba(0, 42, 242, 0.12), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f3f7ff 100%);
      }

      .panel {
        width: min(640px, 100%);
        padding: 34px 30px 30px;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 42, 242, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
        line-height: 1.18;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 15px 18px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--brand-blue);
        color: #ffffff;
        background: var(--brand-blue);
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(0, 42, 242, 0.18);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .panel {
          padding: 24px 20px;
          border-radius: 24px;
        }

        h1 {
          font-size: 28px;
        }

        .actions {
          flex-direction: column;
        }

        a {
          width: 100%;
        }
      }
    </style>
    <script>
      const APP_STORE_URL =
        "https://apps.apple.com/kr/app/%EC%98%AC%ED%83%9D%EC%8A%A4-%EB%82%B4%EC%86%90%EC%95%88%EC%9D%98-%EC%84%B8%EB%AC%B4-%EB%B9%84%EC%84%9C/id6529523756";
      const PLAY_STORE_URL =
        "https://play.google.com/store/apps/details?id=kr.co.alltaxmobile.aos";

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(userAgent);

      function fallbackStoreUrl() {
        if (isIOS) return APP_STORE_URL;
        return PLAY_STORE_URL;
      }

      window.addEventListener("load", () => {
        const manualLink = document.getElementById("manual-link");
        const storeLink = fallbackStoreUrl();
        manualLink.href = storeLink;
      });
    </script>
  </head>
  <body>
    <main class="panel">
      <h1>올택스 앱으로 이동 중입니다</h1>
      <p>
        앱이 자동으로 열리지 않았다면 아래 버튼을 눌러 올택스를 설치하거나
        실행해 주세요.
      </p>
      <div class="actions">
        <a id="manual-link" href="/">스토어로 직접 이동</a>
      </div>
    </main>
  </body>
</html>
