<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올택스 앱으로 이동 중</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #101828;
        --muted: #667085;
        --line: #e4e7ec;
        --accent: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #ffffff 0%, #f6f7fb 45%, #eef2f7 100%);
        color: var(--text);
      }

      .card {
        width: min(560px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 14px 18px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--line);
        color: var(--text);
        background: #fff;
        font-weight: 600;
      }

      a.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
    </style>
    <script>
      const APP_STORE_URL =
        "https://apps.apple.com/kr/app/%EC%98%AC%ED%83%9D%EC%8A%A4-%EB%82%B4%EC%86%90%EC%95%88%EC%9D%98-%EC%84%B8%EB%AC%B4-%EB%B9%84%EC%84%9C/id6529523756";
      const PLAY_STORE_URL =
        "https://play.google.com/store/apps/details?id=kr.co.alltaxmobile.aos";

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(userAgent);

      function fallbackStoreUrl() {
        return isIOS ? APP_STORE_URL : PLAY_STORE_URL;
      }

      window.addEventListener("load", () => {
        const storeLink = fallbackStoreUrl();
        const manualLink = document.getElementById("manual-link");
        const autoLink = document.getElementById("auto-link");

        manualLink.href = storeLink;
        autoLink.href = storeLink;

        // 앱이 설치된 경우 Universal Link/App Link가 먼저 앱을 엽니다.
        // 웹이 열렸다면 fallback으로 스토어로 이동합니다.
        setTimeout(() => {
          window.location.replace(storeLink);
        }, 500);
      });
    </script>
  </head>
  <body>
    <main class="card">
      <h1>올택스 앱으로 이동 중입니다</h1>
      <p>
        앱이 설치되어 있으면 올택스 앱이 열리고, 설치되어 있지 않으면 스토어로
        이동합니다.
      </p>
      <div class="actions">
        <a id="auto-link" class="primary" href="/">스토어로 이동 중...</a>
        <a id="manual-link" href="/">직접 이동하기</a>
      </div>
    </main>
  </body>
</html>
