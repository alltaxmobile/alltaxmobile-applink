<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올택스 앱으로 이동 중</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f7ff;
        --card: #ffffff;
        --text: #1b2340;
        --muted: #5f6885;
        --line: #dfe7ff;
        --brand-blue: #002af2;
        --brand-green: #00d255;
        --brand-navy: #383d5d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0, 210, 85, 0.1), transparent 20%),
          radial-gradient(circle at top right, rgba(0, 42, 242, 0.12), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f3f7ff 100%);
        color: var(--text);
      }

      .card {
        width: min(640px, 100%);
        padding: 34px 30px 30px;
        border: 1px solid var(--line);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 60px rgba(0, 42, 242, 0.08);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #edf2ff;
        color: var(--brand-blue);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .chip::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--brand-green);
      }

      h1 {
        margin: 18px 0 12px;
        font-size: 34px;
        line-height: 1.18;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
        font-size: 16px;
      }

      .preview {
        margin-top: 24px;
        border-radius: 28px;
        padding: 18px;
        background: linear-gradient(180deg, #f7f9ff, #eef3ff);
        border: 1px solid rgba(0, 42, 242, 0.08);
      }

      .screen {
        border-radius: 22px;
        background: #ffffff;
        padding: 18px;
        box-shadow: inset 0 0 0 1px rgba(0, 42, 242, 0.04);
      }

      .logo-bar {
        width: 74px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--brand-blue), var(--brand-green));
        margin-bottom: 18px;
      }

      .line {
        height: 11px;
        border-radius: 999px;
        margin-top: 10px;
        background: rgba(56, 61, 93, 0.12);
      }

      .line.short {
        width: 42%;
      }

      .line.mid {
        width: 72%;
      }

      .line.full {
        width: 100%;
      }

      .status {
        margin-top: 18px;
        border-radius: 18px;
        background: rgba(0, 210, 85, 0.1);
        color: #0e6e3b;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 15px 18px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--line);
        color: var(--text);
        background: #fff;
        font-weight: 700;
      }

      a.primary {
        background: var(--brand-blue);
        color: #fff;
        border-color: var(--brand-blue);
        box-shadow: 0 12px 24px rgba(0, 42, 242, 0.18);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          padding: 24px 20px;
          border-radius: 24px;
        }

        h1 {
          font-size: 28px;
        }

        .actions {
          flex-direction: column;
        }

        a {
          width: 100%;
        }
      }
    </style>
    <script>
      const APP_STORE_URL =
        "https://apps.apple.com/kr/app/%EC%98%AC%ED%83%9D%EC%8A%A4-%EB%82%B4%EC%86%90%EC%95%88%EC%9D%98-%EC%84%B8%EB%AC%B4-%EB%B9%84%EC%84%9C/id6529523756";
      const PLAY_STORE_URL =
        "https://play.google.com/store/apps/details?id=kr.co.alltaxmobile.aos";

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(userAgent);

      function fallbackStoreUrl() {
        return isIOS ? APP_STORE_URL : PLAY_STORE_URL;
      }

      window.addEventListener("load", () => {
        const storeLink = fallbackStoreUrl();
        const manualLink = document.getElementById("manual-link");
        const autoLink = document.getElementById("auto-link");

        manualLink.href = storeLink;
        autoLink.href = storeLink;

        // 앱이 설치된 경우 Universal Link/App Link가 먼저 앱을 엽니다.
        // 웹이 열렸다면 fallback으로 스토어로 이동합니다.
        setTimeout(() => {
          window.location.replace(storeLink);
        }, 500);
      });
    </script>
  </head>
  <body>
    <main class="card">
      <span class="chip">ALLTAX APPLINK</span>
      <h1>올택스 앱으로 이동 중입니다</h1>
      <p>
        앱이 설치되어 있으면 올택스 앱이 열리고, 설치되어 있지 않으면 스토어로
        이동합니다.
      </p>
      <section class="preview" aria-hidden="true">
        <div class="screen">
          <div class="logo-bar"></div>
          <div class="line short"></div>
          <div class="line full"></div>
          <div class="line mid"></div>
          <div class="status">설치된 앱을 확인하고 있어요. 잠시만 기다려주세요.</div>
        </div>
      </section>
      <div class="actions">
        <a id="auto-link" class="primary" href="/">스토어로 이동 중...</a>
        <a id="manual-link" href="/">직접 이동하기</a>
      </div>
    </main>
  </body>
</html>
