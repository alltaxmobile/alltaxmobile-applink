<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>올택스 앱링크</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #101828;
        --muted: #667085;
        --line: #e4e7ec;
        --accent: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #ffffff 0%, #f6f7fb 45%, #eef2f7 100%);
        color: var(--text);
      }

      .card {
        width: min(560px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 14px 18px;
        border-radius: 999px;
        text-decoration: none;
        border: 1px solid var(--line);
        color: var(--text);
        background: #fff;
        font-weight: 600;
      }

      a.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>올택스 앱링크 프로젝트</h1>
      <p>
        이 프로젝트는 올택스 앱 딥링크용 정적 호스팅입니다. 앱이 설치되어 있지
        않은 경우 스토어로 보내는 페이지와 앱 링크 검증 파일을 제공합니다.
      </p>
      <div class="actions">
        <a class="primary" href="/open?target=membership">멤버십 테스트</a>
        <a href="/open?target=payment-methods">결제수단 테스트</a>
      </div>
    </main>
  </body>
</html>
